<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2>Danh sách yêu cầu</h2>

<table border="1">
    <tr>
        <th>Tên</th>
        <th>MSSV</th>
        <th>Email</th>
    </tr>

    <tr th:each="r : ${list}">
        <td th:text="${r.name}"></td>
        <td th:text="${r.studentId}"></td>
        <td th:text="${r.email}"></td>
    </tr>

</table>
</body>
</html>
